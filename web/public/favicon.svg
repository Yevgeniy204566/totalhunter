<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EC8FF"/>
      <stop offset="50%" stop-color="#3D7FFF"/>
      <stop offset="100%" stop-color="#7B3FFF"/>
    </linearGradient>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A3A8F"/>
      <stop offset="100%" stop-color="#2D5FCC"/>
    </linearGradient>
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4060CC"/>
      <stop offset="100%" stop-color="#1A2A7A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Top facets (crown) -->
  <polygon points="50,8 22,38 50,30" fill="url(#top)"/>
  <polygon points="50,8 50,30 78,38" fill="#5090FF"/>
  <polygon points="22,38 50,30 78,38 50,30" fill="url(#top)"/>

  <!-- Bottom facets (pavilion) -->
  <polygon points="22,38 50,92 50,58" fill="url(#left)"/>
  <polygon points="78,38 50,58 50,92" fill="url(#right)"/>
  <polygon points="22,38 50,58 78,38" fill="#2A50BB"/>

  <!-- Gold outline strokes -->
  <polygon points="50,8 22,38 50,92 78,38" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="50" y1="8" x2="50" y2="30" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="22" y1="38" x2="78" y2="38" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="50" y1="30" x2="22" y2="38" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="50" y1="30" x2="78" y2="38" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="22" y1="38" x2="50" y2="58" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="78" y1="38" x2="50" y2="58" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="50" y1="58" x2="50" y2="92" stroke="url(#gold)" stroke-width="1.5"/>
</svg>
