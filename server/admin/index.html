<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Total Hunter — Admin</title>

  <!-- Alpine.js — реактивность без фреймворка -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">

  <style>
    /* ── MD3 Dark + Neon Tokens ─────────────────────────────────── */
    :root {
      --md-surface:        #0f0f14;
      --md-surface-1:      #1a1a24;
      --md-surface-2:      #222233;
      --md-surface-3:      #2a2a40;
      --md-on-surface:     #e2e2ec;
      --md-on-surface-dim: #8a8aaa;
      --md-primary:        #00e5ff;        /* neon cyan */
      --md-primary-dim:    #0097a7;
      --md-secondary:      #7c4dff;        /* neon violet */
      --md-error:          #ff5252;
      --md-success:        #00e676;
      --md-warning:        #ffd740;
      --md-outline:        #3a3a55;
      --md-radius-sm:      8px;
      --md-radius-md:      12px;
      --md-radius-lg:      20px;
      --md-elevation-1:    0 2px 8px rgba(0,229,255,.08);
      --md-elevation-2:    0 4px 20px rgba(0,229,255,.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--md-surface);
      color: var(--md-on-surface);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      background: var(--md-surface-1);
      border-right: 1px solid var(--md-outline);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 0 20px 28px;
      font-size: 18px;
      font-weight: 700;
      color: var(--md-primary);
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--md-primary);
      box-shadow: 0 0 8px var(--md-primary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .3; }
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      border-radius: 0 50px 50px 0;
      margin-right: 12px;
      transition: background .2s, color .2s;
      color: var(--md-on-surface-dim);
      font-size: 14px;
      font-weight: 500;
      user-select: none;
    }

    .nav-item:hover { background: var(--md-surface-2); color: var(--md-on-surface); }
    .nav-item.active {
      background: rgba(0,229,255,.12);
      color: var(--md-primary);
    }

    .nav-item .material-symbols-rounded { font-size: 20px; }

    /* ── Main ────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--md-on-surface);
    }

    /* ── Stat Cards ──────────────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline);
      border-radius: var(--md-radius-md);
      padding: 20px;
      box-shadow: var(--md-elevation-1);
      transition: box-shadow .2s;
    }

    .card:hover { box-shadow: var(--md-elevation-2); }

    .card-label {
      font-size: 12px;
      color: var(--md-on-surface-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .card-value {
      font-size: 32px;
      font-weight: 700;
    }

    .card-value.cyan   { color: var(--md-primary); }
    .card-value.violet { color: var(--md-secondary); }
    .card-value.green  { color: var(--md-success); }
    .card-value.red    { color: var(--md-error); }

    /* ── Section ─────────────────────────────────────────────────── */
    .section {
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline);
      border-radius: var(--md-radius-md);
      padding: 20px;
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
    }

    /* ── Search / Input ──────────────────────────────────────────── */
    .input-field {
      background: var(--md-surface-2);
      border: 1px solid var(--md-outline);
      border-radius: var(--md-radius-sm);
      padding: 10px 14px;
      color: var(--md-on-surface);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }

    .input-field:focus { border-color: var(--md-primary); }
    .input-field::placeholder { color: var(--md-on-surface-dim); }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover   { opacity: .88; }
    .btn:active  { transform: scale(.97); }

    .btn-primary  { background: var(--md-primary);   color: #000; }
    .btn-secondary{ background: var(--md-secondary);  color: #fff; }
    .btn-danger   { background: var(--md-error);      color: #fff; }
    .btn-ghost    {
      background: transparent;
      color: var(--md-primary);
      border: 1px solid var(--md-primary);
    }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* ── Table ───────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      color: var(--md-on-surface-dim);
      font-weight: 500;
      border-bottom: 1px solid var(--md-outline);
      white-space: nowrap;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(58,58,85,.5);
      vertical-align: middle;
    }

    tr:hover td { background: var(--md-surface-2); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-online  { background: rgba(0,230,118,.15); color: var(--md-success); }
    .badge-offline { background: rgba(138,138,170,.1); color: var(--md-on-surface-dim); }
    .badge-banned  { background: rgba(255,82,82,.15);  color: var(--md-error); }

    /* ── Broadcast textarea ──────────────────────────────────────── */
    textarea.input-field { resize: vertical; min-height: 80px; width: 100%; }

    /* ── Token login overlay ──────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-card {
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline);
      border-radius: var(--md-radius-lg);
      padding: 40px;
      width: 360px;
      text-align: center;
      box-shadow: var(--md-elevation-2);
    }

    .login-card h2 { margin-bottom: 8px; color: var(--md-primary); }
    .login-card p  { color: var(--md-on-surface-dim); font-size: 13px; margin-bottom: 24px; }

    /* ── Logs table ──────────────────────────────────────────────── */
    .log-payload {
      font-family: monospace;
      font-size: 11px;
      color: var(--md-on-surface-dim);
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Spinner ──────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--md-outline);
      border-top-color: var(--md-primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--md-surface-3);
      border: 1px solid var(--md-primary);
      border-radius: var(--md-radius-sm);
      padding: 12px 20px;
      font-size: 14px;
      z-index: 200;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }
  </style>
</head>

<body x-data="adminApp()" x-init="init()">

  <!-- ── Token Login Overlay ───────────────────────────────────── -->
  <div class="overlay" x-show="!authenticated" x-cloak>
    <div class="login-card">
      <h2>🎯 Total Hunter</h2>
      <p>Введи Admin Token для входа</p>
      <input
        class="input-field"
        type="password"
        placeholder="Admin Token"
        x-model="tokenInput"
        @keyup.enter="login()"
        style="width:100%;margin-bottom:16px;"
      >
      <button class="btn btn-primary" style="width:100%" @click="login()">Войти</button>
      <p x-show="loginError" style="color:var(--md-error);margin-top:12px;font-size:13px">
        Неверный токен
      </p>
    </div>
  </div>

  <!-- ── Sidebar ───────────────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="dot"></div>
      Total Hunter
    </div>

    <div class="nav-item" :class="{active: page==='dashboard'}" @click="page='dashboard'; loadStats()">
      <span class="material-symbols-rounded">dashboard</span> Dashboard
    </div>
    <div class="nav-item" :class="{active: page==='users'}" @click="page='users'; loadUsers()">
      <span class="material-symbols-rounded">group</span> Пользователи
    </div>
    <div class="nav-item" :class="{active: page==='logs'}" @click="page='logs'; loadLogs()">
      <span class="material-symbols-rounded">bug_report</span> Логи
    </div>
    <div class="nav-item" :class="{active: page==='broadcast'}" @click="page='broadcast'">
      <span class="material-symbols-rounded">campaign</span> Broadcast
    </div>
  </nav>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main class="main">

    <!-- DASHBOARD -->
    <template x-if="page==='dashboard'">
      <div>
        <div class="page-title">Dashboard</div>

        <div class="cards">
          <div class="card">
            <div class="card-label">Онлайн сейчас</div>
            <div class="card-value cyan" x-text="stats.online_users ?? '…'"></div>
          </div>
          <div class="card">
            <div class="card-label">Всего юзеров</div>
            <div class="card-value" x-text="stats.total_users ?? '…'"></div>
          </div>
          <div class="card">
            <div class="card-label">Забанено</div>
            <div class="card-value red" x-text="stats.banned_users ?? '…'"></div>
          </div>
          <div class="card">
            <div class="card-label">Находок сегодня</div>
            <div class="card-value green" x-text="stats.hunts_today ?? '…'"></div>
          </div>
          <div class="card">
            <div class="card-label">Бирж всего</div>
            <div class="card-value violet" x-text="stats.exchanges_total ?? '…'"></div>
          </div>
          <div class="card">
            <div class="card-label">Склепов всего</div>
            <div class="card-value cyan" x-text="stats.crypts_total ?? '…'"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <div class="section-title">Топ-10 охотников</div>
            <button class="btn btn-ghost btn-sm" @click="loadStats()">
              <span class="material-symbols-rounded" style="font-size:16px">refresh</span> Обновить
            </button>
          </div>
          <p style="color:var(--md-on-surface-dim);font-size:13px">
            Скоро: Leaderboard TOP-50 по количеству находок.
          </p>
        </div>
      </div>
    </template>

    <!-- USERS -->
    <template x-if="page==='users'">
      <div>
        <div class="page-title">Пользователи</div>

        <div class="section">
          <div class="section-header">
            <input
              class="input-field"
              placeholder="Поиск: HWID / Email / Username"
              x-model="search"
              @input.debounce.400ms="loadUsers()"
              style="width:300px"
            >
            <button class="btn btn-ghost btn-sm" @click="loadUsers()">
              <span class="material-symbols-rounded" style="font-size:16px">refresh</span>
            </button>
          </div>

          <div x-show="loading" style="text-align:center;padding:24px">
            <div class="spinner"></div>
          </div>

          <div class="table-wrap" x-show="!loading">
            <table>
              <thead>
                <tr>
                  <th>Статус</th>
                  <th>Username / HWID</th>
                  <th>Email</th>
                  <th>Баланс</th>
                  <th>Реф. баланс</th>
                  <th>Рефералы</th>
                  <th>IP</th>
                  <th>Версия</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="u in users" :key="u.id">
                  <tr>
                    <td>
                      <span class="badge" :class="u.is_banned ? 'badge-banned' : (u.is_online ? 'badge-online' : 'badge-offline')"
                        x-text="u.is_banned ? 'BAN' : (u.is_online ? 'Online' : 'Offline')">
                      </span>
                    </td>
                    <td>
                      <div style="font-weight:500" x-text="u.username || '—'"></div>
                      <div style="font-size:11px;color:var(--md-on-surface-dim);font-family:monospace" x-text="u.hwid"></div>
                    </td>
                    <td style="color:var(--md-on-surface-dim)" x-text="u.email || '—'"></td>
                    <td>
                      <span style="color:var(--md-primary);font-weight:600" x-text="u.credits"></span> кр.
                    </td>
                    <td>
                      <span style="color:var(--md-secondary)" x-text="u.ref_credits"></span> кр.
                    </td>
                    <td style="font-size:12px;color:var(--md-on-surface-dim)">
                      L1: <span x-text="u.referrals.l1"></span> |
                      L2: <span x-text="u.referrals.l2"></span> |
                      L3: <span x-text="u.referrals.l3"></span>
                    </td>
                    <td style="font-size:11px;font-family:monospace;color:var(--md-on-surface-dim)" x-text="u.ip_address || '—'"></td>
                    <td style="font-size:12px" x-text="u.bot_version || '—'"></td>
                    <td>
                      <div style="display:flex;gap:6px;flex-wrap:wrap">
                        <button class="btn btn-primary btn-sm" @click="adjustCredits(u.hwid, 300)">+300</button>
                        <button class="btn btn-danger btn-sm" @click="toggleBan(u)">
                          <span x-text="u.is_banned ? 'Разбан' : 'Бан'"></span>
                        </button>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="users.length === 0 && !loading">
                  <td colspan="9" style="text-align:center;color:var(--md-on-surface-dim);padding:24px">
                    Пользователи не найдены
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div style="display:flex;align-items:center;gap:12px;margin-top:16px;justify-content:flex-end">
            <span style="font-size:13px;color:var(--md-on-surface-dim)">
              Всего: <span x-text="totalUsers"></span>
            </span>
            <button class="btn btn-ghost btn-sm" :disabled="page_num===1" @click="page_num--; loadUsers()">← Назад</button>
            <span style="font-size:13px" x-text="`Стр. ${page_num}`"></span>
            <button class="btn btn-ghost btn-sm" @click="page_num++; loadUsers()">Далее →</button>
          </div>
        </div>
      </div>
    </template>

    <!-- LOGS -->
    <template x-if="page==='logs'">
      <div>
        <div class="page-title">Логи ошибок</div>
        <div class="section">
          <div class="section-header">
            <div class="section-title">Телеметрия от ботов</div>
            <button class="btn btn-ghost btn-sm" @click="loadLogs()">
              <span class="material-symbols-rounded" style="font-size:16px">refresh</span>
            </button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Время</th>
                  <th>HWID</th>
                  <th>Тип</th>
                  <th>Сообщение</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="l in logs" :key="l.id">
                  <tr>
                    <td style="font-size:11px;white-space:nowrap;color:var(--md-on-surface-dim)" x-text="formatDate(l.created_at)"></td>
                    <td style="font-family:monospace;font-size:11px" x-text="l.hwid"></td>
                    <td><span class="badge badge-banned" x-text="l.event_type"></span></td>
                    <td class="log-payload" x-text="l.payload"></td>
                  </tr>
                </template>
                <tr x-show="logs.length === 0">
                  <td colspan="4" style="text-align:center;color:var(--md-on-surface-dim);padding:24px">
                    Логи пусты
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </template>

    <!-- BROADCAST -->
    <template x-if="page==='broadcast'">
      <div>
        <div class="page-title">Broadcast</div>
        <div class="section" style="max-width:600px">
          <div class="section-title" style="margin-bottom:16px">
            Отправить сообщение всем ботам
          </div>
          <textarea
            class="input-field"
            placeholder="Текст уведомления..."
            x-model="broadcastMsg"
          ></textarea>
          <div style="margin-top:12px;display:flex;gap:10px;align-items:center">
            <button class="btn btn-primary" @click="sendBroadcast()" :disabled="!broadcastMsg">
              <span class="material-symbols-rounded" style="font-size:18px">send</span>
              Отправить
            </button>
            <span style="font-size:12px;color:var(--md-on-surface-dim)">
              Сообщение появится у всех при следующем /check_auth
            </span>
          </div>
        </div>
      </div>
    </template>

  </main>

  <!-- Toast -->
  <div class="toast" x-show="toast" x-text="toast" x-cloak></div>

<script>
  const API  = '';   // Same origin — FastAPI на :8000 отдаёт и фронт, и API
  const PER  = 50;

  function adminApp() {
    return {
      authenticated: false,
      tokenInput: '',
      loginError: false,
      token: localStorage.getItem('admin_token') || '',

      page: 'dashboard',
      loading: false,
      toast: '',

      stats: {},
      users: [],
      totalUsers: 0,
      page_num: 1,
      search: '',
      logs: [],
      broadcastMsg: '',

      // ── Init ─────────────────────────────────────────────────
      async init() {
        if (this.token) {
          const ok = await this.verify();
          if (ok) { this.authenticated = true; this.loadStats(); }
          else     { this.token = ''; localStorage.removeItem('admin_token'); }
        }
      },

      async verify() {
        try {
          const r = await fetch(`${API}/admin/stats`, { headers: this.headers() });
          return r.ok;
        } catch { return false; }
      },

      login() {
        this.token = this.tokenInput;
        this.verify().then(ok => {
          if (ok) {
            localStorage.setItem('admin_token', this.token);
            this.authenticated = true;
            this.loginError = false;
            this.loadStats();
          } else {
            this.loginError = true;
            this.token = '';
          }
        });
      },

      headers() {
        return { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' };
      },

      // ── Stats ─────────────────────────────────────────────────
      async loadStats() {
        const r = await fetch(`${API}/admin/stats`, { headers: this.headers() });
        if (r.ok) this.stats = await r.json();
      },

      // ── Users ─────────────────────────────────────────────────
      async loadUsers() {
        this.loading = true;
        const q = new URLSearchParams({ page: this.page_num, per_page: PER });
        if (this.search) q.append('search', this.search);
        const r = await fetch(`${API}/admin/users?${q}`, { headers: this.headers() });
        if (r.ok) {
          const d = await r.json();
          this.users = d.users;
          this.totalUsers = d.total;
        }
        this.loading = false;
      },

      async toggleBan(u) {
        const r = await fetch(
          `${API}/admin/ban?hwid=${u.hwid}&banned=${!u.is_banned}`,
          { method: 'POST', headers: this.headers() }
        );
        if (r.ok) { u.is_banned = !u.is_banned; this.showToast(u.is_banned ? 'Забанен' : 'Разбанен'); }
      },

      async adjustCredits(hwid, amount) {
        const r = await fetch(
          `${API}/admin/adjust_credits?hwid=${hwid}&amount=${amount}&note=admin+panel`,
          { method: 'POST', headers: this.headers() }
        );
        if (r.ok) { this.showToast(`+${amount} кредитов начислено`); this.loadUsers(); }
      },

      // ── Logs ──────────────────────────────────────────────────
      async loadLogs() {
        const r = await fetch(`${API}/admin/logs?limit=50`, { headers: this.headers() });
        if (r.ok) this.logs = await r.json();
      },

      // ── Broadcast ─────────────────────────────────────────────
      async sendBroadcast() {
        const r = await fetch(
          `${API}/admin/broadcast?message=${encodeURIComponent(this.broadcastMsg)}`,
          { method: 'POST', headers: this.headers() }
        );
        if (r.ok) { this.showToast('Broadcast отправлен!'); this.broadcastMsg = ''; }
      },

      // ── Helpers ───────────────────────────────────────────────
      formatDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleString('ru-RU', { dateStyle: 'short', timeStyle: 'short' });
      },

      showToast(msg) {
        this.toast = msg;
        setTimeout(() => this.toast = '', 3000);
      },
    };
  }
</script>
</body>
</html>
